<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Couples Money Tracker</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f4f6fb;
}
header{
  background:#0b5fff;
  color:white;
  padding:12px;
  font-weight:bold;
}
.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}
.card{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
}
button{
  background:#0b5fff;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
}
.list-item{
  border:1px solid #ddd;
  border-radius:10px;
  padding:8px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<header>Couples Money Tracker (Firebase Auto Sync)</header>

<div class="container">

<div class="card">
  <h3>Add Transaction</h3>

  <label>Date</label>
  <input type="date" id="date">

  <label>Type</label>
  <select id="type">
    <option value="expense">Expense</option>
    <option value="income">Income</option>
  </select>

  <label>Category</label>
  <input id="category" placeholder="Groceries">

  <label>Amount</label>
  <input id="amount" placeholder="45.90">

  <button id="saveBtn">Save</button>
</div>

<div class="card">
  <h3>Transactions</h3>
  <div id="list"></div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


// ⭐ BUILT-IN FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCwMqkHIuLdAU2pBXwgxMq6LlLjlDTqIOI",
  authDomain: "budget-tracker-e4e82.firebaseapp.com",
  projectId: "budget-tracker-e4e82"
};

// ⭐ SHARED SYNC KEY (same for both devices)
const SYNC_KEY = "DUKE-AASHNA-2026-9f3c1a7d2b7a4c";

let app, auth, db;

if(!getApps().length){
  app = initializeApp(firebaseConfig);
}else{
  app = getApps()[0];
}

auth = getAuth(app);
await signInAnonymously(auth);

db = getFirestore(app);

const ref = doc(db,"couplesMoneyTracker",SYNC_KEY);

let state = { tx:[] };

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  state.tx.sort((a,b)=>b.date.localeCompare(a.date));

  state.tx.forEach(t=>{
    const div=document.createElement("div");
    div.className="list-item";
    div.innerHTML = `
      <b>${t.type.toUpperCase()}</b> - £${t.amount}<br>
      ${t.category}<br>
      <small>${t.date}</small>
    `;
    list.appendChild(div);
  });
}

async function saveRemote(){
  await setDoc(ref,state,{merge:true});
}

document.getElementById("saveBtn").addEventListener("click",async()=>{

  const tx = {
    id: crypto.randomUUID(),
    date: document.getElementById("date").value,
    type: document.getElementById("type").value,
    category: document.getElementById("category").value,
    amount: Number(document.getElementById("amount").value)
  };

  if(!tx.date || !tx.amount){
    alert("Enter date + amount");
    return;
  }

  state.tx.push(tx);
  render();
  await saveRemote();
});


// ⭐ REALTIME SYNC (AUTO)
onSnapshot(ref,(snap)=>{
  if(snap.exists()){
    state = snap.data();
    if(!state.tx) state.tx=[];
    render();
  }
});

console.log("Firebase connected ✔");

</script>

</body>
</html>
